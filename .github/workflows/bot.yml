name: trade-bot

# Gira ogni 30 minuti (orari in UTC). Puoi anche avviarlo a mano da Actions.
on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write          # serve per ricommittare state.json

concurrency:
  group: trade-bot
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Installa dipendenze
        run: pip install -r requirements.txt

      - name: Esegui il bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot.py

      - name: Salva lo stato (e tieni viva la repo)
        run: |
          git config user.name "trade-bot"
          git config user.email "bot@users.noreply.github.com"
          git add state.json
          git diff --staged --quiet || git commit -m "update state [skip ci]"
          git push
