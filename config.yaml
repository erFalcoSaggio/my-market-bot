# ============================================================
#  Configurazione del bot — RADAR AZIONI.
#  Il tuo PAC e' separato e INTOCCABILE: qui si parla solo di azioni singole.
#  Il bot ti avvisa SOLO sui cali forti, come radar per andare a investigare
#  (occasione o trappola? lo decidi tu dopo aver capito perche' e' scesa).
# ============================================================

# Watchlist di azioni (ticker in formato Yahoo Finance). Modificabile liberamente.
stocks:
  - { ticker: "AAPL",  name: "Apple" }
  - { ticker: "MSFT",  name: "Microsoft" }
  - { ticker: "NVDA",  name: "Nvidia" }
  - { ticker: "AMZN",  name: "Amazon" }
  - { ticker: "GOOGL", name: "Alphabet (Google)" }
  - { ticker: "META",  name: "Meta" }
  - { ticker: "TSLA",  name: "Tesla" }

# SOLO cali forti -> poche notifiche. Scatta un avviso se l'azione:
thresholds:
  daily_drop_pct: 7      #  - crolla di almeno il 7% in un giorno, OPPURE
  drawdown_pct: 30       #  - e' a -30% o piu' dai massimi a 52 settimane, OPPURE
  near_low_pct: 3        #  - e' entro il 3% dal minimo a 52 settimane

alert_cooldown_hours: 48 # non ripetere lo stesso avviso prima di 48 ore

# Crypto: OPZIONALE e piu' rischioso (default: spento). Avvisa sui forti cali di BTC/ETH.
crypto:
  enabled: false
  tickers: ["BTC-USD", "ETH-USD"]
  dip_pct: 25
  suggest_eur: 25

# Promemoria settimanale: fotografia della watchlist (cosi' non ti sommerge di messaggi).
weekly_status:
  weekday: 0             # 0 = lunedi'
  hour_utc: 7            # 7 UTC ~ 9 ora italiana
