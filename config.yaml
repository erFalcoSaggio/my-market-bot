# ============================================================
#  Configurazione del bot — versione SEMPLICE e orientata all'azione.
#  Regola di fondo: "compra di piu' quando il mercato mondiale e' in sconto".
#  Pochi messaggi, e quando arrivano ti dicono cosa fare in modo netto.
# ============================================================

# "Termometro" del mercato mondiale (misura gli sconti). E' l'MSCI World in euro,
# lo stesso indice del tuo PAC: cosi' lo sconto e' quello che vedi davvero tu.
market_gauge:
  ticker: "SWDA.MI"
  name: "Mercato mondiale (MSCI World)"

# Cosa comprare quando c'e' l'occasione (lo strumento che gia' conosci).
buy_target: "ETF MSCI World (lo stesso del tuo PAC), su Trade Republic"

# SCALA DEGLI SCONTI: piu' il mercato e' sceso dai massimi (52 settimane),
# piu' forte e' il segnale. suggest_eur = importo extra indicativo da comprare.
# Modifica gli importi in base a quanta liquidita' hai da parte.
dip_ladder:
  - drawdown: 10
    level: "🟢 SCONTO"
    suggest_eur: 50
  - drawdown: 15
    level: "🟢🟢 BUON SCONTO"
    suggest_eur: 100
  - drawdown: 20
    level: "🟢🟢🟢 OCCASIONE"
    suggest_eur: 150
  - drawdown: 30
    level: "🟢🟢🟢🟢 OCCASIONE RARA"
    suggest_eur: 200

# Crypto: OPZIONALE e piu' rischioso. Se enabled=true ti avvisa sui forti cali di
# BTC/ETH, ma solo come "soldi che puoi permetterti di perdere". Default: spento.
crypto:
  enabled: false
  tickers: ["BTC-USD", "ETH-USD"]
  dip_pct: 25                # avvisa a -25% dai massimi
  suggest_eur: 25

# Promemoria di tranquillita': 1 volta a settimana (cosi' non ti sommerge di messaggi).
weekly_status:
  weekday: 0                 # 0 = lunedi'
  hour_utc: 7                # 7 UTC ~ 9 ora italiana
